kind = "web"
previewPath = "/"
title = "Shopify → WooCommerce Converter"
version = "1.0.0"
id = "artifacts/converter-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20811

[services.development]
run = "pnpm --filter @workspace/converter-app run dev"

[services.production]
build = ["bash", "-c", "PORT=20811 BASE_PATH=/ pnpm --filter @workspace/converter-app run build"]
publicDir = "artifacts/converter-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20811"
BASE_PATH = "/"
